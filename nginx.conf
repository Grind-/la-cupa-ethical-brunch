events {
    worker_connections 1024;
}

http {
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 10s;

    server {
        listen 80;
        server_name _;

        proxy_ssl_server_name on;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;

        location / {
            proxy_pass https://lacupaethicalbrunch.com;
            proxy_set_header Host lacupaethicalbrunch.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Accept-Encoding "";
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_hide_header X-Frame-Options;
            proxy_hide_header Content-Security-Policy;

            sub_filter 'https://lacupaethicalbrunch.com' '';
            sub_filter 'http://lacupaethicalbrunch.com' '';
            sub_filter_once off;
            sub_filter_types text/html text/css application/javascript text/javascript;

            proxy_read_timeout 60s;
            proxy_connect_timeout 10s;
        }
    }
}
