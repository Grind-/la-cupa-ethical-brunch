events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ $uri/index.html =404;
        }

        # Handle versioned query strings (e.g. .css?ver=...)
        location ~* \.(css|js)(\?.*)?$ {
            try_files $uri =404;
            expires 1y;
            add_header Cache-Control "public";
        }

        location ~* \.(jpg|jpeg|png|gif|svg|ico|woff|woff2|ttf|eot|webp)(\?.*)?$ {
            try_files $uri =404;
            expires 1y;
            add_header Cache-Control "public";
        }
    }
}
