events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # Booking system – proxy to FastAPI
        location /booking {
            proxy_pass http://booking:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }

        location /login {
            proxy_pass http://booking:8000/login;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }

        location /admin {
            proxy_pass http://booking:8000/admin;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }

        location ^~ /uploads {
            proxy_pass http://booking:8000/uploads;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_cache_valid 200 1h;
            proxy_read_timeout 60s;
        }

        # Static site files
        location / {
            try_files $uri $uri/ $uri/index.html =404;
        }

        location ~* \.(css|js)(\?.*)?$ {
            try_files $uri =404;
            expires 1y;
            add_header Cache-Control "public";
        }

        location ~* \.(jpg|jpeg|png|gif|svg|ico|woff|woff2|ttf|eot|webp)(\?.*)?$ {
            try_files $uri =404;
            expires 1y;
            add_header Cache-Control "public";
        }
    }
}
